name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'


    - name: Build Java Application
      run: |
        cd java-app
        mvn clean package -DskipTests


    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Portfolio Docker Image
      run: |
        docker build -t stanphlux007/portfolio-app:latest ./portfolio-app


    - name: Build Java Docker Image
      run: |
        docker build -t stanphlux007/java-app:latest ./java-app


    - name: Push Portfolio Image
      run: |
        docker push stanphlux007/portfolio-app:latest


    - name: Push Java Image
      run: |
        docker push stanphlux007/java-app:latest



  deploy-to-ec2:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2 Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          cd ~/devops-final-project
          git pull origin main
          docker compose pull
          docker compose up -d
          docker ps
