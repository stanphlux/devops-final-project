---
- name: Configure Stanphlux DevOps Server
  hosts: webserver
  become: yes

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - docker.io
          - nginx
          - git
        state: present

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Enable Nginx service
      systemd:
        name: nginx
        enabled: yes
        state: started

    - name: Create deployment directory
      file:
        path: /opt/devops-app
        state: directory
        mode: '0755'
